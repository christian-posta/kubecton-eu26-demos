---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: dev-servereverything-server
  namespace: agentgateway-system
spec:
  parentRefs:
  - name: agentgateway
    namespace: agentgateway-system
  rules:
  - backendRefs:
    - group: agentgateway.dev
      kind: AgentgatewayBackend
      name: dev-servereverything-server
    matches:
    - path:
        type: Exact
        value: /server/mcp
    - path:
        type: Exact
        value: /.well-known/oauth-protected-resource/server/mcp
    - path:
        type: Exact
        value: /.well-known/oauth-authorization-server/server/mcp
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: dev-servereverything-server
  namespace: agentgateway-system
spec:
  mcp:
    targets:
    - name: dev-servereverything-server-target
      static:
        host: servereverything.dev
        path: /mcp
        policies:
          tls: {}
        port: 443
        protocol: StreamableHTTP
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: dev-servereverything-server-jwks
  namespace: agentgateway-system
spec:
  policies:
    tls: {}
  static:
    host: ceposta-solo.auth0.com
    port: 443
---
apiVersion: enterpriseagentgateway.solo.io/v1alpha1
kind: EnterpriseAgentgatewayPolicy
metadata:
  name: dev-servereverything-server-policy
  namespace: agentgateway-system
spec:
  backend:
    mcp:
      authentication:
        audiences:
        - https://ceposta-agw.ngrok.io/mcp
        issuer: https://ceposta-solo.auth0.com/
        jwks:
          backendRef:
            group: agentgateway.dev
            kind: AgentgatewayBackend
            name: dev-servereverything-server-jwks
          jwksPath: .well-known/jwks.json
        mode: Strict
        provider: Auth0
        resourceMetadata:
          authorizationServers:
          - https://ceposta-agw.ngrok.io/server/mcp
          bearerMethodsSupported:
          - header
          - body
          - query
          resource: https://ceposta-agw.ngrok.io/server/mcp
          resourceDocumentation: https://ceposta-agw.ngrok.io/server/mcp/docs
          resourcePolicyUri: https://ceposta-agw.ngrok.io/server/mcp/policies
          scopesSupported:
          - profile
          - openid
          - offline_access
    tls: {}
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: dev-servereverything-server
  traffic:
    cors:
      allowCredentials: false
      allowHeaders:
      - '*'
      allowMethods:
      - '*'
      allowOrigins:
      - '*'
    headerModifiers:
      request:
        remove:
        - x-forwarded-for
        - x-forwarded-host
        - x-forwarded-proto
