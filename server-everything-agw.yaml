---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: dev-servereverything-server
  namespace: agentgateway-system
spec:
  mcp:
    targets:
    - name: dev-servereverything-server-target
      static:
        host: servereverything.dev
        path: /mcp
        policies:
          tls: {}
        port: 443
        protocol: StreamableHTTP
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: dev-servereverything-server
  namespace: agentgateway-system
spec:
  parentRefs:
  - name: agentgateway
    namespace: agentgateway-system
  rules:
  - backendRefs:
    - group: agentgateway.dev
      kind: AgentgatewayBackend
      name: dev-servereverything-server
    matches:
    - path:
        type: PathPrefix
        value: /server/mcp
